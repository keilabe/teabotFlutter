name: teabot
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_storage: ^11.5.6
  firebase_app_check: ^0.2.1+8
  image_picker: ^1.0.4
  flutter_image_compress: ^2.1.0
  path_provider: ^2.1.1
  path: ^1.8.3
  flutter_svg: ^2.0.9
  fl_chart: ^0.65.0
  intl: ^0.19.0
  font_awesome_flutter: ^10.7.0
  tflite: ^1.1.2
  image: ^4.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/tea_logo.svg
    - assets/images/
    - assets/model.tflite
    - assets/labels.txt
